body:
  text: 春秋傳説例自録春秋類公即位例雩例災例盟會例遇例來朝例使來例搜狩例師行例侵伐例納例降例奔例歸入例以歸例還復例卒葬例內女卒葬例世子例大夫帥師例大夫奔例大夫歸入例殺大夫例遂例弗不例臣等謹案春秋傳説例一卷宋劉敞撰敞學問淵博尤長于春秋所著經解諸編皆别著録此書發凡舉要又其説經之綱領也其弟攽作敞行狀歐陽修作敞墓志俱稱敞説例凡二卷陳振孫書録解題則以為一卷蓋傳抄分合互有不同至宋史藝文志獨稱敞説例十一卷殆傳寫誤衍一十字耳敞春秋傳權衡意林三書通志堂經解有刋板文權與説例二書則僅有其名絶無傳本今檢永樂大典尚雜引説例之文謹詳加綴輯仍釐為一卷據書録解題原書凡四十九條今之所裒僅二十五條才得其半且多零篇斷句不盡全文又惟公即位例遇例使來例師行例大夫奔例殺大夫例弗不例七條載有原書標目餘則説存而標目復佚今並詳繹本文倣原存諸條體例為之校補諸書所載俱稱春秋説例惟永樂大典加傳字按是編比事以發論乃其傳文褒貶之大指永樂大典所載似為宋刻之舊今亦從之敞解春秋多出新意而文體則頗仿公穀諸書皆然是編尤為簡古惟大夫帥師例一條稱魯不當有軍而以周禮為後人附會考古殊疏又宣十八年經文歸父還自晉敞春秋傳從左氏作至笙而是編則從公穀作至柳亦頗自相抵牾其餘則大致精核多得經意而宋元説經諸家都未徵引可知自宋以後已稱罕覯是編崖咯幸存固春秋家所當寶貴矣乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書春秋傳説例宋劉敞撰公即位例即位則書正月未即位則不書正月原注定無正月是也繼正則書即位繼故則不書即位原注莊閔僖受命則書王不受命則不書王原注桓無王雩例諸侯之雩主星辰山川天子之雩主上帝魯用天子之禮故曰大雩也雩得雨則曰雩不得雨則書旱矣書不雨者旱而不害物也或歷時而書不雨或逾時而書不雨見所害也案劉敞春秋傳云一時不雨書之常也歷時而言不雨慢也無志乎民也歷月而言不雨閔也有志乎民也附録于此災例春秋記災不記火火者人所為也災者天所為也天所為故大之而記之人所為則被其焚者火之性耳是何足記也宣十六年宣榭災左氏以為火非是昭九年陳災穀梁以為火亦非是盟會例盟會皆君之禮也故微者之盟之會不志乎春秋春秋之所志者必有君與貴大夫居其間者也原注惡曹之盟三國人似俱微者其實非微者微者不志由大夫之盟始于此故貶稱人耳北杏之會五國人似俱微者其實非微者微者不志由大夫之會始于此故貶稱人耳會而後盟則書會案此條有缺文考劉敞春秋傳云盟者何殺牲載書而約也會者何約信命事而不殺也盟曷為或言會或言及及直及也會又會也附録于此遇例公與諸侯遇志也外遇不志也其志者以我有事接之也所以謂外遇不志者遇者小事小事不志來朝例諸侯朝用夷禮者名之朝而旅見者纍數之禮不足者則不言朝也原注介葛盧夷狄之君雖來而朝猶不曰朝非以其不能朝也蓋曰不足以朝録也使來例君遣再命大夫必以君使為文由大夫尊故正其名也自一命而下微矣君不嫌使微者故不待稱君使也帥師則不言君使者將在外君命有所不受也使有常文自內出者皆曰如自外來者皆曰使內不言如外不言使是謂專之原注臧孫辰乞糴楚屈完來盟于師其有所歸或曰來者來然後歸也原注鄭伯使宛來歸祊或不曰來者歸而不來也原注齊人歸公孫敖之喪搜狩例春田曰搜因以振旅夏田曰苗因以茇舍秋田曰獮因以治兵冬田曰狩因以大閲不得其地則書之不得其時則書之桓公大閲不得其時也莊公治兵亦不得其時也大搜者大比也師行例將尊師衆稱某帥師將尊師少稱將將卑師衆稱師將卑師少稱人所謂尊者三命再命卿也所謂衆者大國三軍次國二軍也侵伐例有鐘鼓曰伐無鐘鼓曰侵其言鄙者鄙逺之也猶曰我不受其責爾其不言鄙者我豈無過也哉過斯受之焉納例諸侯有相納之道諸言納者納之是也其納不正雖興師旅不得與納之名衛侯朔齊侯昭是也降例降者其意也降之者不得已也降者猶得其國家者也降之者雖得其國家不列于諸侯矣遷者亦然案劉敞春秋傳云未失其國家者復見失其國家者不復見附識于此奔例國君以仁義為守以禮樂為教以政刑為法以賢智為輔雖有強暴孰能亡之是以春秋諸侯之奔者莫曰人逐之而曰自亡也故諸言奔者將必治其罪則正言其名正言其名有所不通是以諱所尊則曰居原注天王居諱所親則曰孫諱所賢則曰大去大去者將遜于位之意也歸入例歸者善辭也有易辭焉入者惡辭也有難辭焉為易辭者而先見所惡突歸于鄭是也為易辭者而先見所善蔡季自陳歸于蔡是也已嘗為諸侯南面稱孤矣出而復者則曰復歸復歸者其可復也衛侯衎曹伯襄是也其不可復雖復其位亦不言其復也衛侯朔衛侯鄭曹伯負芻是也案劉敞春秋傳云諸侯歸可言復大夫歸不可言復諸侯世國故可以復大夫不世官故不可以復諸侯之言復者位未絶復可也大夫之言復者位絶矣復不可也諸侯位雖未絶歸而不言復已絶者也大夫位雖已絶入而不言復未絶者也與此文互相發明自某者某為之主也在諸侯則先所自原注衛侯鄭自楚在京師則先所歸原注曹伯歸自京師歸而名者皆在所誅也以歸例以歸者囚服者也國君去南面之位而囚服苟免是以賤之而名也還復例師行使出其反也或曰還或曰復復者事未畢也言中道而復還者事已畢也反而至之辭事畢與未畢按文可見然而聖人别而異之者義將有所施也歸父受命而聘晉聘者既反聞君之喪必復命于殯乃可謂終事矣歸父聘而反聞君之喪至柳而奔于事為未終當曰復自晉不得云還自晉也仲尼為人之疑于歸父之未終事故曰還言歸父之家遣矣不可入入則殺殺則增君之惡其出也賢于入故以終事之辭免歸父也士丐侵齊至榖而還未終事也仲尼患人之不知義以士丐為未終事也故加之終事之辭所以免賢者也言是乃實終事矣卒葬例諸侯卒名之正也惟天子不名也諸侯卒則赴赴則必及其名以書于策所以繼世序位也其不名者彼不以名來僭天子之尊故因其事以見其僭也徐使容駒弔于邾請視含邾人以為易于雜禮有然矣世或疑臣不當赴君之名是不然古之人不諱也卒哭而後諱其交于鬼神則臣質君之名豈嫌赴于簡策哉春秋諸侯之不以道死者皆名也其不名故也若邾人之戕鄫子者也所以起問者決是非也天子之葬公自行公自行常事也常事不書卿往會之非常也非常當書而卿以君命出境亦當書故兩書之大夫往會之又薄矣彌非常故亦書而大夫或一命賤不得見經則但一書葬而已弒君賊未討則不書葬賊既討則書葬蓋必待討賊而後葬之也隱公不書葬比其葬時不聞討賊也桓公書葬比其葬時魯人知殺彭生矣未逾年之王沒則書卒不成君也不稱王不二君也未逾年之君沒則書卒不成君也不書葬不二君也原注有子與無子同之春案此條亦有缺文考劉敞秋傳云諸侯曷為或卒或不卒或葬或不葬卒自外録也葬自內録也不卒非外也不葬非內也葬者臣子之事也國滅不葬無臣子也君弒賊不討不葬亦無臣子也又桓十七年葬蔡桓侯傳云葬者稱公此其稱爵何稱爵禮也稱公非禮也稱爵者誄之于天子者也稱公者非誄之于天子者也又云莒不書葬其號夷也吳楚不書葬其號嫌也附録于此內女卒葬例內女嫁于諸侯則尊同尊同則記其卒記其卒則必記其葬所以申人情也然而夫婦之道王教之本聖人所至慎其行淫其志僻雖欲申人情春秋不聽則奪其葬鄫季姬把叔姬是也其行潔其志貞雖均之于葬春秋嘉之則載其諡宋共姬是也此所以正人倫之大統也內女嫁于諸侯則書其卒或未嘗嫁而亦書其卒何也曰許嫁矣許嫁矣則字而筓之死則以成人之喪治之然而葬于女氏也葬于女氏則尊未全尊未全故略其國而沒其葬也世子例春秋之書世子以著其正也故鄭忽稱世子蔡友稱世子衛蒯瞶稱世子是皆失位者也得罪者也春秋不以其失位而奪其號不以其得罪而削其名原其所以失者在所不當絶故存之也大夫帥師例季孫行父臧孫許叔孫僑如公孫嬰齊戰于鞍四之何也原注據凡師但書元帥四軍非禮也季孫斯叔孫州仇仲孫何忌伐邾三之何也三軍非禮也季孫斯仲孫何忌侵衛兩之何也兩軍非禮也然則諸侯軍制奈何大國三卿皆命于天子次國三卿二卿命于天子小國三卿一卿命于天子元侯之卿有軍作師以承天子諸侯之卿無軍教衛以贊元侯原注明諸侯之卿不得立軍行但教衛士衛士之數不足軍也魯次國也一軍多矣原注緣教衛之禮故一軍雖為多然尚可也二軍非禮也原注經稱作三軍明未作三軍之時已有二軍然二軍亦非禮蓋在春秋前有之三軍僭也四軍悖也原注周禮大國三卿三軍然晉自武公始以一軍稱侯而獻公乃私立二軍魯作三軍而叔孫穆子稱魯不當有軍參此三者求春秋之義知周禮所言是後世增加穆子之説為精案是篇蓋據國語叔孫穆子之説而謂不當有軍又據杜預左傳注而謂魯未作中軍之前止有二軍其實費誓稱魯人三郊三遂即大國三軍之證又魯頌公徒三萬鄭康成云大國三軍合三萬七千五百人言三萬者舉成數也則魯之舊制非止二軍明矣況本書師行例一條亦有次國二軍語此以魯不當有軍之説為據殆未詳考大夫奔例春秋大夫之奔所與也在外則字之原注宋子哀是矣在內則微之原注季子不言奔所賢也則為文以見其實歸父之至柳公孫壽之自鄸是也此兩人皆有罪不得不奔然而不以己之得罪而廢君臣之禮不怨天不尤人者也可以訓後世矣詳其地所以賢之也大夫歸入例入者以惡入也歸者以善歸也加復者其位已絶矣求自復者也記其位絶與未絶者大夫雖有故去國君不掃其宗廟也不纍其宗族也不收其田里也出入詔于國爵祿列于朝此之謂有禮君有禮矣然而臣猶敢行稱亂此臣之罪也如掃其宗廟纍其宗族收其田里則君實涼德矣是以按春秋之文而察之華亥向寧之罪大欒盈之罪小此所以見也元咺之奔晉其位亦絶矣故其反也曰復然咺非有甲兵之勢非有篡逼之謀也求歸而已矣故不得言復入也殺大夫例稱國殺而名大夫者罪纍上也稱人殺而名大夫者大夫罪也稱人而不名大夫者大夫無罪由衆殺之也原注宋人殺其大夫稱國而不名大夫者大夫無罪由君殺之也原注曹殺其大夫稱人殺而不以大夫道者非其大夫也原注晉人殺欒盈稱君殺者世子母弟也非殺大夫而稱公子者稱人則為有罪稱國則為無罪原注陳人殺其公子禦冦莒殺其公子意恢亦皆世子母弟遂例大夫無遂事諸言遂者皆生事也所以知大夫無遂事者設大夫出境君命兩事則必兩書之公子遂會晉趙盾盟于衡雍公子遂會雒戎盟于暴是也所以謂大夫無遂事者凡遂事必因物造謀而非宿計也或遂而可或遂而不可春秋因其可而與之因其不可而刺之公子結媵陳人之婦于鄄遂及齊侯宋公盟著其地所以明在境外此遂而可者也季孫宿救台遂入鄆台在境內而擅命此遂而不可者也弗不例弗者詭辭也不者直辭也春秋傳説例
